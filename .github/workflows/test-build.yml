name: Test build

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build (leave empty for current branch)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
      fail-fast: false
    steps:
    - name: run on mac
      if: matrix.os == 'macos-latest'
      run: sudo xcode-select -s /Library/Developer/CommandLineTools
    - name: run on linux
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get install libarchive-tools
    - uses: actions/checkout@v4
    - name: Checkout PR
      if: ${{ github.event.inputs.pr_number }}
      shell: bash
      run: |
        if [[ "$PR_NUM" =~ ^[1-9][0-9]*$ ]]; then
          gh pr checkout "$PR_NUM"
        else
          echo "Error: PR number must be a positive integer"
          exit 1
        fi
      env:
        GH_TOKEN: ${{ secrets.github_token }}
        PR_NUM: ${{ github.event.inputs.pr_number }}
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: actions/setup-node@v4
      with:
        node-version: '22.20.0'
    - run: pip install setuptools
    - run: npm install npm -g
    - run: npm install
    - run: node_modules/.bin/electron-builder build --publish=never
      env:
        GH_TOKEN: ${{ secrets.github_token }}
    - uses: actions/upload-artifact@v4
      with:
        name: stretchly-${{ matrix.os }}-${{ github.run_id }}
        path: dist/*.*
        retention-days: 30
